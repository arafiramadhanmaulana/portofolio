<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Arafi Ramadhan Maulana</title>
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

  <div class="gate" id="gate">
    <div class="gate-box">
      <h2 class="gate-title">Admin Access</h2>
      <p class="gate-desc">Enter password to view analytics</p>
      <input type="password" id="gate-pw" class="gate-input" placeholder="Password" autofocus>
      <button class="btn btn-primary" id="gate-btn" style="width: 100%;">Sign In</button>
      <div class="gate-err" id="gate-err">Incorrect password</div>
    </div>
  </div>

  <div class="layout" id="app" style="display: none;">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-text" style="margin-left: 0;">AR Analytics</div>
      </div>
      <nav class="nav-group">
        <div class="nav-label">General</div>
        <a href="#" class="nav-item active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
          Overview
        </a>

        <a href="#" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
          Visitors
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="/" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M13 12H3"/></svg>
          Back to Site
        </a>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="Search by IP, city, or device...">
          <kbd class="search-shortcut">/</kbd>
        </div>
        <div class="topbar-actions">
          <div class="system-status" id="system-status">
            <span class="status-dot"></span>
            <span class="status-text">System Online</span>
          </div>
          <button class="btn" id="export-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export
          </button>
        </div>
      </header>

      <div class="scroll-area">
        <h1 class="header-title">Dashboard Overview</h1>



        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">Activity Logs <span id="total-logs" style="font-size: 12px; color: var(--text-muted); font-weight: 400; margin-left: 8px;">(0)</span></div>
            <div class="filters-bar" style="margin: 0; display: flex; gap: 8px;">
              <input type="date" id="filter-date" class="filter-select" style="color: var(--text-main);">
              <select class="filter-select" id="filter-device">
                <option value="all">All Devices</option>
                <option value="Desktop">Desktop</option>
                <option value="Mobile">Mobile</option>
              </select>
            </div>
          </div>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Time</th>
                  <th>IP / ISP</th>
                  <th>Location</th>
                  <th>Device / OS</th>
                  <th>Duration</th>
                  <th>Interactions</th>
                </tr>
              </thead>
              <tbody id="table-body">
                <tr>
                  <td><div class="skel"></div></td>
                  <td><div class="skel"></div></td>
                  <td><div class="skel"></div></td>
                  <td><div class="skel"></div></td>
                  <td><div class="skel"></div></td>
                  <td><div class="skel"></div></td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="pagination-bar">
            <button class="btn btn-sm" id="page-prev" disabled>Previous</button>
            <span class="page-info" id="page-info">Page 1 of 1</span>
            <button class="btn btn-sm" id="page-next" disabled>Next</button>
          </div>
        </div>

      </div>
    </main>
  </div>

  <div class="modal-overlay" id="log-modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Activity Details</h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-body">
      </div>
    </div>
  </div>

  <script src="assets/js/admin.js"></script>
</body>
</html>
