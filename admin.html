<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Visitor Analytics</title>
  <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='50' fill='%23818cf8'/><text y='65' x='20' font-family='sans-serif' font-size='60' font-weight='bold' fill='white'>AR</text></svg>">
  <style>
    :root {
      --bg-dark: #0a0a0f;
      --bg-card: #141420;
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --primary: #818cf8;
      --border-light: rgba(255, 255, 255, 0.06);
    }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-primary);
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-light);
    }
    .header h1 {
      margin: 0;
      color: var(--primary);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 24px;
    }
    .stat-title {
      font-size: 14px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .stat-value {
      font-size: 36px;
      font-weight: bold;
      color: var(--text-primary);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background-color: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border-light);
    }
    th, td {
      padding: 16px 20px;
      text-align: left;
      border-bottom: 1px solid var(--border-light);
    }
    th {
      background-color: rgba(255,255,255,0.02);
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 14px;
    }
    td {
      font-size: 14px;
      color: var(--text-primary);
    }
    tr:hover {
      background-color: rgba(255,255,255,0.03);
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }
    .badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      background: rgba(129, 140, 248, 0.2);
      color: var(--primary);
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Analytics Dashboard</h1>
    <button onclick="fetchData()" style="padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">Refresh Data</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-title">Total Pengunjung</div>
      <div class="stat-value" id="total-visitors">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-title">Pengunjung Hari Ini</div>
      <div class="stat-value" id="today-visitors">-</div>
    </div>
  </div>

  <h3>Riwayat Kunjungan</h3>
  <div style="overflow-x: auto;">
    <table id="visitors-table">
      <thead>
        <tr>
          <th>Waktu</th>
          <th>IP Address</th>
          <th>Lokasi</th>
          <th>Perangkat</th>
          <th>OS & Browser</th>
          <th>Halaman</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="6" class="loading">Loading data...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://bsatkunfxyclbmraoczo.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_R1Qum0HdYElJ1tTHAEXzIQ_aiQFwO8_';

  async function fetchData() {
    document.getElementById('table-body').innerHTML = '<tr><td colspan="6" class="loading">Loading data...</td></tr>';
    
    try {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/visitors?select=*&order=created_at.desc`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });
      
      const data = await response.json();
      
      if(data.error) {
        throw new Error(data.error.message || "Gagal mengambil data");
      }

      // Update Stats
      document.getElementById('total-visitors').textContent = data.length;
      
      const today = new Date().toISOString().split('T')[0];
      const todayCount = data.filter(v => v.created_at.startsWith(today)).length;
      document.getElementById('today-visitors').textContent = todayCount;

      // Update Table
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';
      
      if(data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="loading">Belum ada pengunjung.</td></tr>';
        return;
      }

      data.forEach(visitor => {
        const date = new Date(visitor.created_at).toLocaleString('id-ID');
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="white-space: nowrap; color: var(--text-secondary); font-size: 13px;">${date}</td>
          <td><code>${visitor.ip_address || '-'}</code></td>
          <td>${visitor.city || '-'}, ${visitor.country || '-'}</td>
          <td><span class="badge">${visitor.device_type || '-'}</span></td>
          <td>${visitor.os || '-'} / ${visitor.browser || '-'}</td>
          <td style="color: var(--text-secondary);">${visitor.page_visited || '-'}</td>
        `;
        tbody.appendChild(tr);
      });
      
    } catch (error) {
      console.error(error);
      document.getElementById('table-body').innerHTML = `<tr><td colspan="6" class="loading" style="color: #ef4444;">Error: Tabel 'visitors' belum dibuat atau kredensial salah. Pastikan Anda sudah menjalankan script SQL di Supabase.</td></tr>`;
    }
  }

  // Load data on page load
  fetchData();
</script>

</body>
</html>
